<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — مستشفى العالمية IVF</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- هيكل اللوحة الرئيسية -->
  <div class="dashboard-layout">

    <!-- ─── الشريط الجانبي ──────────────────────────────────────── -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="القائمة الرئيسية">

      <!-- شعار وعنوان -->
      <div class="sidebar-brand">
        <span class="brand-icon" aria-hidden="true">
          <!-- شعار مستشفى العالمية IVF مصغّر للشريط الجانبي -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="28" height="28"
               role="img" aria-label="شعار مستشفى العالمية IVF">
            <rect x="24" y="4" width="16" height="56" rx="4" fill="rgba(255,255,255,0.95)"/>
            <rect x="4" y="24" width="56" height="16" rx="4" fill="rgba(255,255,255,0.95)"/>
            <path d="M32 38 C32 38 23 32 23 26 C23 22.5 25.5 20 28.5 20 C30.2 20 31.7 20.9 32 22
                     C32.3 20.9 33.8 20 35.5 20 C38.5 20 41 22.5 41 26 C41 32 32 38 32 38Z"
                  fill="#e63946" opacity="0.85"/>
          </svg>
        </span>
        <span>العالمية IVF</span>
      </div>

      <!-- روابط الوحدات (تُملأ بـ app.js) -->
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="وحدات النظام"></nav>

    </aside>

    <!-- ─── المنطقة الرئيسية ─────────────────────────────────────── -->
    <div class="main-area">

      <!-- الشريط العلوي -->
      <header class="topbar">
        <div class="topbar-brand-inline" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="22" height="22">
            <rect x="24" y="4" width="16" height="56" rx="4" fill="#1a6eb5"/>
            <rect x="4" y="24" width="56" height="16" rx="4" fill="#1a6eb5"/>
            <path d="M32 38 C32 38 23 32 23 26 C23 22.5 25.5 20 28.5 20 C30.2 20 31.7 20.9 32 22
                     C32.3 20.9 33.8 20 35.5 20 C38.5 20 41 22.5 41 26 C41 32 32 38 32 38Z"
                  fill="#e63946"/>
          </svg>
          <span class="topbar-hospital-name">مستشفى العالمية IVF</span>
        </div>
        <span class="topbar-title" id="topbar-module-title">لوحة التحكم</span>

        <div class="topbar-user">
          <!-- بيانات المستخدم (تُملأ بـ app.js) -->
          <div class="user-info">
            <div class="user-name" id="topbar-username">—</div>
            <div class="user-roles" id="topbar-roles">—</div>
          </div>
          <div class="avatar" id="topbar-avatar" aria-hidden="true">؟</div>
          <button class="btn btn-secondary btn-sm" id="logout-btn" title="تسجيل الخروج">
            خروج
          </button>
        </div>
      </header>

      <!-- منطقة المحتوى الديناميكية -->
      <main class="content-area" id="content-area" role="main">
        <!-- مؤشر تحميل أولي -->
        <div class="loading">
          <div class="spinner"></div>
          <span>جارٍ التحميل...</span>
        </div>
      </main>

    </div>
  </div>

  <!-- ─── تحميل السكريبتات ──────────────────────────────────────── -->

  <!-- 1. طبقة API -->
  <script src="js/api.js"></script>

  <!-- 2. المصادقة -->
  <script src="js/auth.js"></script>

  <!-- 3. وحدات النظام (كل وحدة تسجّل نفسها في window.HMS.modules) -->
  <script src="js/modules/patients.js"></script>
  <script src="js/modules/appointments.js"></script>
  <script src="js/modules/medical-records.js"></script>
  <script src="js/modules/prescriptions.js"></script>
  <script src="js/modules/lab.js"></script>
  <script src="js/modules/billing.js"></script>
  <script src="js/modules/departments.js"></script>
  <script src="js/modules/users.js"></script>

  <!-- 4. منسّق التطبيق الرئيسي (يقرأ window.HMS.modules ويبني القائمة) -->
  <script src="js/app.js"></script>

</body>
</html>
