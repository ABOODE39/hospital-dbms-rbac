<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مستشفى العالمية IVF — تسجيل الدخول</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <!-- شاشة تسجيل الدخول -->
  <div class="login-wrapper">

    <!-- شعار + عنوان المنظومة -->
    <div class="login-brand">
      <div class="login-logo" aria-hidden="true">
        <!-- شعار مستشفى العالمية IVF: صليب طبي + قلب/جنين رمزي -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="72" height="72"
             role="img" aria-label="شعار مستشفى العالمية IVF">
          <!-- صليب طبي -->
          <rect x="24" y="4" width="16" height="56" rx="4" fill="rgba(255,255,255,0.95)"/>
          <rect x="4" y="24" width="56" height="16" rx="4" fill="rgba(255,255,255,0.95)"/>
          <!-- قلب رمزي (IVF) داخل الصليب -->
          <path d="M32 38 C32 38 23 32 23 26 C23 22.5 25.5 20 28.5 20 C30.2 20 31.7 20.9 32 22
                   C32.3 20.9 33.8 20 35.5 20 C38.5 20 41 22.5 41 26 C41 32 32 38 32 38Z"
                fill="#e63946" opacity="0.85"/>
        </svg>
      </div>
      <h1 class="login-title">مستشفى العالمية IVF</h1>
      <p class="login-subtitle">Al-Aalamiya IVF Hospital — DBMS</p>
    </div>

    <!-- بطاقة تسجيل الدخول -->
    <div class="card login-card">
      <h2 class="card-heading">تسجيل الدخول</h2>

      <!-- رسالة الخطأ (مخفية افتراضياً) -->
      <div id="login-error" class="alert alert-error" role="alert" hidden></div>

      <form id="login-form" novalidate>

        <div class="form-group">
          <label for="username" class="form-label">اسم المستخدم</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="أدخل اسم المستخدم"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">كلمة المرور</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="أدخل كلمة المرور"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span class="btn-text">دخول</span>
          <span class="btn-spinner" hidden>...</span>
        </button>

      </form>
    </div>

    <p class="login-footer">مستشفى العالمية IVF — نظام إدارة قاعدة البيانات الآمن</p>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /* حارس الصفحة: إذا كان المستخدم مسجلاً بالفعل → اذهب للوحة */
    if (localStorage.getItem('hms_token')) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('login-error');
      const btn      = document.getElementById('login-btn');

      /* إخفاء الخطأ السابق وتفعيل حالة التحميل */
      errEl.hidden = true;
      btn.disabled = true;
      btn.querySelector('.btn-text').hidden   = true;
      btn.querySelector('.btn-spinner').hidden = false;

      const result = await HMS_Auth.handleLogin(username, password);

      if (!result.ok) {
        errEl.textContent = result.message;
        errEl.hidden      = false;
        btn.disabled      = false;
        btn.querySelector('.btn-text').hidden   = false;
        btn.querySelector('.btn-spinner').hidden = true;
      }
      /* النجاح: handleLogin يُعيد التوجيه تلقائياً */
    });
  </script>
</body>
</html>
