# نشر واجهة المستشفى (frontend الثابتة) على GitHub Pages.
# ملاحظة: Pages يستضيف ملفّات ثابتة فقط — الواجهة تُعرض كاملةً، لكن وظائف
# تسجيل الدخول/البيانات تحتاج الـbackend (Express+PostgreSQL) المُختبَر عبر ci.yml.
name: Deploy Frontend to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# تشغيل واحد متزامن (لا تتعارض عمليات النشر)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
